project.ext.lwjglVersion = "3.3.3"
project.ext.lwjglNatives = "natives-windows"

repositories {
    mavenCentral()
}

// Configuration to download LWJGL natives for repackaging
configurations {
    lwjglNativesRaw
}

dependencies {
    // Download natives for repackaging (module-info.class will be stripped)
    lwjglNativesRaw "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-windows"
    lwjglNativesRaw "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-windows"
    lwjglNativesRaw "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-linux"
    lwjglNativesRaw "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-linux"
}

// Task to extract LWJGL native binaries (DLLs/SOs) from native JARs
// LWJGL can load natives from the classpath root - no module-info.class issues
def extractedNativesDir = layout.buildDirectory.dir("extracted-natives")

tasks.register('extractLwjglNatives') {
    description = 'Extracts native binaries from LWJGL native JARs for bundling'
    group = 'build'

    inputs.files(configurations.lwjglNativesRaw)
    outputs.dir(extractedNativesDir)

    doLast {
        def outputDir = extractedNativesDir.get().asFile
        outputDir.mkdirs()

        configurations.lwjglNativesRaw.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            def inputJar = artifact.file
            logger.lifecycle("Extracting natives from ${inputJar.name}")

            // Extract only native binaries (.dll, .so, .dylib)
            copy {
                from(zipTree(inputJar)) {
                    include '**/*.dll'
                    include '**/*.so'
                    include '**/*.dylib'
                    // Flatten directory structure - put all natives at root
                    eachFile { fcp ->
                        fcp.relativePath = new RelativePath(true, fcp.name)
                    }
                    includeEmptyDirs = false
                }
                into outputDir
            }
        }

        // List extracted files
        outputDir.listFiles()?.each { file ->
            logger.lifecycle("  Extracted: ${file.name}")
        }
    }
}

// Include extracted natives in the mod JAR root
// LWJGL will find them there when the mod JAR is on the classpath
tasks.named('jar') {
    dependsOn 'extractLwjglNatives'

    from(extractedNativesDir) {
        // Natives at JAR root for LWJGL to find
        into ''
    }
}

dependencies {
    implementation platform("org.lwjgl:lwjgl-bom:$lwjglVersion")

    // LWJGL core - provided by Minecraft
    implementation "org.lwjgl:lwjgl"

    // LWJGL-LMDB and LWJGL-ZSTD - Required by Voxy, NOT provided by Minecraft
    // Reference: https://docs.neoforged.net/toolchain/docs/dependencies/nonmclibs/
    //
    // The natives JARs originally have module-info.class with "requires org.lwjgl.zstd"
    // which causes JPMS conflict. We repackage them without module-info.class above.
    jarJar(implementation("org.lwjgl:lwjgl-lmdb:$lwjglVersion")) {
        version { strictly "[3.3.0,4.0.0)"; prefer "$lwjglVersion" }
    }
    jarJar(implementation("org.lwjgl:lwjgl-zstd:$lwjglVersion")) {
        version { strictly "[3.3.0,4.0.0)"; prefer "$lwjglVersion" }
    }
    // Add to runtime classpath for MC 1.21.1 (not needed for 1.21.9+)
    additionalRuntimeClasspath "org.lwjgl:lwjgl-lmdb:$lwjglVersion"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-zstd:$lwjglVersion"
    // Natives also need to be on runtime classpath (LWJGL extracts from classpath)
    additionalRuntimeClasspath "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-windows"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-windows"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-linux"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-linux"

    // === JarJar Bundled Dependencies (full feature parity) ===

    // RocksDB - Default storage backend
    jarJar(implementation('org.rocksdb:rocksdbjni')) {
        version {
            strictly '[10.0.0, 11.0.0)'
            prefer '10.2.1'
        }
    }

    // LZ4 - PROVIDED by Minecraft runtime (do NOT bundle - causes module conflict)
    implementation 'org.lz4:lz4-java:1.8.0'

    // Redis storage backend + connection pooling
    jarJar(implementation('redis.clients:jedis:5.1.0')) {
        version {
            strictly '[5.0.0, 6.0.0)'
            prefer '5.1.0'
        }
    }
    // commons-pool2 is a transitive dependency of jedis
    implementation 'org.apache.commons:commons-pool2:2.12.0'

    // Distant Horizons import support
    jarJar(implementation('org.tukaani:xz:1.10')) {
        version {
            strictly '[1.9, 2.0)'
            prefer '1.10'
        }
    }
    jarJar(implementation('org.xerial:sqlite-jdbc:3.49.1.0')) {
        version {
            strictly '[3.40.0.0, 4.0.0.0)'
            prefer '3.49.1.0'
        }
    }
    //implementation 'org.rocksdb:rocksdbjni:8.10.0'
    //implementation 'redis.clients:jedis:5.1.0'
}

if (!isInGHA) {
    repositories {
        maven {
            url = "https://pkgs.dev.azure.com/djtheredstoner/DevAuth/_packaging/public/maven/v1"
        }
    }

    dependencies {
        /*
        modRuntimeOnly('me.djtheredstoner:DevAuth-fabric:1.2.1') {
            exclude group: 'net.fabricmc', module: 'fabric-loader'
        }*/
    }
}
